<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Cevap Anahtarı — Türkiye'nin Kitap Cevap Anahtarı Platformu</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <!-- HEADER -->
  <header>
    <div class="header-inner">
      <a href="index.html" class="logo">
        <span>✓</span>Cevap Anahtarı
      </a>
    </div>
  </header>

  <!-- HERO / ARAMA -->
  <section class="hero">
    <h1>Kitabını Bul, Cevabını Gör</h1>
    <p>Türkiye'deki tüm ders kitaplarının cevap anahtarları tek bir yerde</p>
    <div class="search-wrapper">
      <input
        type="text"
        id="searchInput"
        placeholder="Kitap adı, ders veya yayınevi ara..."
        autocomplete="off"
      />
      <button onclick="aramaYap()">🔍</button>
    </div>
  </section>

  <!-- İÇERİK -->
  <div class="container">

    <!-- FİLTRELER -->
    <div class="filters">
      <label>Filtrele:</label>

      <select id="filterSinif" onchange="filtrele()">
        <option value="">Tüm Sınıflar</option>
        <option value="8">8. Sınıf</option>
        <option value="9">9. Sınıf</option>
        <option value="10">10. Sınıf</option>
        <option value="11">11. Sınıf</option>
        <option value="12">12. Sınıf</option>
      </select>

      <select id="filterDers" onchange="filtrele()">
        <option value="">Tüm Dersler</option>
        <option value="Türkçe">Türkçe</option>
        <option value="Türk Dili ve Edebiyatı">Türk Dili ve Edebiyatı</option>
        <option value="Matematik">Matematik</option>
        <option value="Fizik">Fizik</option>
        <option value="Kimya">Kimya</option>
        <option value="Biyoloji">Biyoloji</option>
        <option value="Tarih">Tarih</option>
        <option value="Coğrafya">Coğrafya</option>
        <option value="İngilizce">İngilizce</option>
      </select>

      <select id="filterYayinevi" onchange="filtrele()">
        <option value="">Tüm Yayınevleri</option>
        <option value="MEB">MEB</option>
        <option value="Palme">Palme</option>
        <option value="Birey">Birey</option>
        <option value="FDD">FDD</option>
        <option value="Zambak">Zambak</option>
        <option value="Koza">Koza</option>
        <option value="Sınav">Sınav</option>
        <option value="Hiper Zeka">Hiper Zeka</option>
        <option value="Ankara Yayıncılık">Ankara Yayıncılık</option>
      </select>

      <button class="filter-reset" onclick="filtreleriSifirla()">✕ Sıfırla</button>
    </div>

    <!-- SONUÇ BAŞLIĞI -->
    <div class="section-title" id="sectionTitle">
      Tüm Kitaplar — <span id="kitapSayisi">0</span> kitap
    </div>

    <!-- KİTAP KARTLARI -->
    <div class="books-grid" id="booksGrid"></div>

  </div>

  <!-- FOOTER -->
  <footer>
    <p>© 2024 Cevap Anahtarı — Türkiye'nin kitap cevap anahtarı platformu</p>
  </footer>

  <script src="data.js"></script>
  <script>
    let mevcutKitaplar = [...kitaplar];

    // Sayfa yüklenince kitapları göster
    window.onload = function () {
      goster(kitaplar);
    };

    // Arama
    function aramaYap() {
      filtrele();
    }

    // Enter ile arama
    document.addEventListener('DOMContentLoaded', function () {
      document.getElementById('searchInput').addEventListener('keyup', function (e) {
        if (e.key === 'Enter') aramaYap();
        else filtrele();
      });
    });

    // Filtreleme
    function filtrele() {
      const arama = document.getElementById('searchInput').value.toLowerCase().trim();
      const sinif = document.getElementById('filterSinif').value;
      const ders = document.getElementById('filterDers').value;
      const yayinevi = document.getElementById('filterYayinevi').value;

      const sonuc = kitaplar.filter(k => {
        const aramaEslesti = !arama ||
          k.ad.toLowerCase().includes(arama) ||
          k.ders.toLowerCase().includes(arama) ||
          k.yayinevi.toLowerCase().includes(arama) ||
          k.sinif.includes(arama);

        const sinifEslesti = !sinif || k.sinif === sinif;
        const dersEslesti = !ders || k.ders === ders;
        const yayineviEslesti = !yayinevi || k.yayinevi === yayinevi;

        return aramaEslesti && sinifEslesti && dersEslesti && yayineviEslesti;
      });

      goster(sonuc);
    }

    // Filtreleri sıfırla
    function filtreleriSifirla() {
      document.getElementById('searchInput').value = '';
      document.getElementById('filterSinif').value = '';
      document.getElementById('filterDers').value = '';
      document.getElementById('filterYayinevi').value = '';
      goster(kitaplar);
    }

    // Kitapları ekrana bas
    function goster(liste) {
      const grid = document.getElementById('booksGrid');
      const sayac = document.getElementById('kitapSayisi');
      sayac.textContent = liste.length;

      if (liste.length === 0) {
        grid.innerHTML = `
          <div class="no-results" style="grid-column:1/-1">
            <div class="icon">🔍</div>
            <p>Aradığınız kriterlere uygun kitap bulunamadı.</p>
          </div>`;
        return;
      }

      grid.innerHTML = liste.map(k => `
        <a class="book-card" href="kitap.html?id=${k.id}">
          <div class="book-card-badge">${k.ders}</div>
          <h3>${k.icon} ${k.ad}</h3>
          <div class="book-meta">${k.sinif}. Sınıf &bull; ${k.yayinevi}</div>
          <span class="btn-view">Cevap Anahtarını Gör →</span>
        </a>
      `).join('');
    }
  </script>

</body>
</html>
