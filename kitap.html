<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Cevap Anahtarı</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <!-- HEADER -->
  <header>
    <div class="header-inner">
      <a href="index.html" class="logo">
        <span>✓</span>Cevap Anahtarı
      </a>
    </div>
  </header>

  <!-- İÇERİK -->
  <div class="container">
    <a href="index.html" class="back-btn">← Kitap Listesine Dön</a>
    <div id="icerik">Yükleniyor...</div>
  </div>

  <!-- FOOTER -->
  <footer>
    <p>© 2024 Cevap Anahtarı — Türkiye'nin kitap cevap anahtarı platformu</p>
  </footer>

  <script src="data.js"></script>
  <script>
    // URL'den kitap id'sini al
    const params = new URLSearchParams(window.location.search);
    const id = parseInt(params.get('id'));
    const kitap = kitaplar.find(k => k.id === id);
    const icerik = document.getElementById('icerik');

    if (!kitap) {
      icerik.innerHTML = `
        <div class="no-results">
          <div class="icon">😕</div>
          <p>Kitap bulunamadı. <a href="index.html" style="color:var(--primary)">Ana sayfaya dön</a></p>
        </div>`;
    } else {
      document.title = kitap.ad + ' — Cevap Anahtarı';

      // Ünitelerin cevap HTML'ini oluştur
      const unitelerHTML = kitap.uniteler.map(unite => {
        const cevaplarHTML = Object.entries(unite.cevaplar).map(([soru, cevap]) => `
          <div class="answer-item">
            <span class="q-num">${soru}. Soru</span>
            <span class="q-ans">${cevap}</span>
          </div>
        `).join('');

        return `
          <div class="unit-title">${unite.baslik}</div>
          <div class="answers-grid">${cevaplarHTML}</div>
        `;
      }).join('');

      icerik.innerHTML = `
        <!-- KİTAP BAŞLIĞI -->
        <div class="book-detail-header">
          <div class="book-icon">${kitap.icon}</div>
          <div>
            <h1>${kitap.ad}</h1>
            <div class="meta-tags">
              <span class="meta-tag">📚 ${kitap.sinif}. Sınıf</span>
              <span class="meta-tag">📖 ${kitap.ders}</span>
              <span class="meta-tag">🏢 ${kitap.yayinevi}</span>
            </div>
          </div>
        </div>

        <!-- CEVAP ANAHTARI -->
        <div class="answer-section">
          <h2>📋 Cevap Anahtarı</h2>
          ${unitelerHTML}
        </div>
      `;
    }
  </script>

</body>
</html>
